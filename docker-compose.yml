services:
  db:
    image: mysql:lts
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"
    env_file:
      - ./.env

  server:
    build: ./server
    command: npm run dev
    depends_on:
      - db
    ports:
      - "8080:8080"
    env_file:
      - ./.env
    environment:
      DB_NAME: ${MYSQL_DATABASE}

volumes:
  db_data:
